<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJM Groundworks — Concept Preview | Serious Onions</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafaf8; --white: #fff; --dark: #111110; --text: #3a3a38;
      --muted: #8a8a82; --accent: #ff5722; --accent2: #e64a19;
      --border: #e8e8e4; --radius: 12px;
      --sans: 'Inter', sans-serif; --display: 'Space Grotesk', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    /* Top bar */
    .client-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      background: var(--dark); color: #fff; padding: 12px 24px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .client-bar-left { display: flex; align-items: center; gap: 12px; }
    .client-bar-logo { color: var(--accent); }
    .client-bar strong { font-weight: 700; }
    .client-bar .client-name { color: var(--accent); font-weight: 600; }
    .client-bar-right { display: flex; gap: 16px; align-items: center; }
    .client-bar a { font-size: 12px; font-weight: 600; transition: color 0.2s; }
    .client-bar a:hover { color: var(--accent); }

    .view-toggle {
      display: flex; background: #333; border-radius: 100px; overflow: hidden;
    }
    .view-toggle button {
      background: none; border: none; color: #999; padding: 6px 14px;
      font-size: 11px; font-weight: 600; font-family: var(--sans); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    .logout-btn {
      background: #333; border: none; color: #999; padding: 6px 14px;
      border-radius: 100px; font-size: 11px; font-weight: 600;
      font-family: var(--sans); cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .logout-btn:hover { background: #555; color: #fff; }

    /* Preview frame */
    .preview-wrap {
      padding-top: 48px; display: flex; justify-content: center;
      min-height: 100vh; background: #e0e0e0;
    }
    .preview-frame {
      width: 100%; height: calc(100vh - 48px); border: none;
      transition: max-width 0.4s ease;
    }
    .preview-frame.desktop { max-width: 100%; }
    .preview-frame.tablet { max-width: 768px; }
    .preview-frame.mobile { max-width: 375px; }

    /* Feedback bar */
    .feedback-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 24px; display: flex; gap: 12px; align-items: center;
      z-index: 99998;
    }
    .feedback-bar input {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: 13px; font-family: var(--sans);
    }
    .feedback-bar input:focus { outline: none; border-color: var(--accent); }
    .feedback-btn {
      padding: 10px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 100px; font-size: 13px; font-weight: 600;
      font-family: var(--sans); cursor: pointer; transition: background 0.2s;
    }
    .feedback-btn:hover { background: var(--accent2); }
    .feedback-sent {
      display: none; font-size: 13px; color: #28a745; font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- CLIENT TOP BAR -->
  <div class="client-bar">
    <div class="client-bar-left">
      <svg class="client-bar-logo" viewBox="0 0 48 48" width="24" height="24"><circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="24" cy="24" r="14" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="24" cy="24" r="6" fill="currentColor"/></svg>
      <span><strong>Serious Onions</strong> — Client Preview</span>
      <span class="client-name" id="clientName"></span>
    </div>
    <div class="client-bar-right">
      <div class="view-toggle">
        <button class="active" onclick="setView('desktop', this)">Desktop</button>
        <button onclick="setView('tablet', this)">Tablet</button>
        <button onclick="setView('mobile', this)">Mobile</button>
      </div>
      <button class="logout-btn" id="fullscreenBtn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-wrap">
    <iframe class="preview-frame desktop" id="previewFrame" src="https://mossphil-dev.github.io/mjm-groundworks/" allow="*" referrerpolicy="no-referrer"></iframe>
  </div>

  <!-- FEEDBACK -->
  <div class="feedback-bar">
    <input type="text" id="feedbackInput" placeholder="Leave a comment or feedback on this design...">
    <button class="feedback-btn" onclick="sendFeedback()">Send Feedback</button>
    <span class="feedback-sent" id="feedbackSent">&#10003; Feedback noted — thank you!</span>
  </div>

  <script>
    // Auth check
    if (!sessionStorage.getItem('so_client')) {
      window.location.href = '../client-login.html';
    }
    document.getElementById('clientName').textContent = sessionStorage.getItem('so_name') || '';

    // View toggle
    function setView(mode, btn) {
      document.getElementById('previewFrame').className = 'preview-frame ' + mode;
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // Fullscreen toggle
    var isFullscreen = false;
    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      var bar = document.querySelector('.client-bar');
      var fb = document.querySelector('.feedback-bar');
      var wrap = document.querySelector('.preview-wrap');
      var frame = document.getElementById('previewFrame');
      var btn = document.getElementById('fullscreenBtn');
      if (isFullscreen) {
        bar.style.display = 'none';
        fb.style.display = 'none';
        wrap.style.paddingTop = '0';
        frame.style.height = '100vh';
        btn.textContent = 'Exit Fullscreen';
        // Show a small floating exit button
        var exit = document.createElement('button');
        exit.id = 'exitFullscreen';
        exit.textContent = 'Exit Fullscreen';
        exit.style.cssText = 'position:fixed;top:12px;right:12px;z-index:999999;background:#333;color:#fff;border:none;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;opacity:0.7;transition:opacity 0.2s;';
        exit.onmouseenter = function(){this.style.opacity='1';};
        exit.onmouseleave = function(){this.style.opacity='0.7';};
        exit.onclick = toggleFullscreen;
        document.body.appendChild(exit);
      } else {
        bar.style.display = '';
        fb.style.display = '';
        wrap.style.paddingTop = '';
        frame.style.height = '';
        btn.textContent = 'Fullscreen';
        var exit = document.getElementById('exitFullscreen');
        if (exit) exit.remove();
      }
    }

    // Logout
    function logout() {
      sessionStorage.removeItem('so_client');
      sessionStorage.removeItem('so_name');
      window.location.href = '../client-login.html';
    }

    // Feedback — sends email via Formspree
    function sendFeedback() {
      const input = document.getElementById('feedbackInput');
      const msg = input.value.trim();
      if (!msg) return;

      const client = sessionStorage.getItem('so_name') || 'Unknown';
      const btn = document.querySelector('.feedback-btn');
      btn.textContent = 'Sending...';

      fetch('https://formspree.io/f/mojpagnw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _subject: 'Client Feedback — ' + client,
          client: client,
          message: msg,
          timestamp: new Date().toLocaleString('en-GB')
        })
      }).then(() => {
        input.value = '';
        btn.textContent = 'Send Feedback';
        document.getElementById('feedbackSent').style.display = 'inline';
        setTimeout(() => document.getElementById('feedbackSent').style.display = 'none', 3000);
      }).catch(() => {
        btn.textContent = 'Send Feedback';
        alert('Could not send — try emailing hello@seriousonions.com instead.');
      });
    }

    // Enter to send
    document.getElementById('feedbackInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendFeedback();
    });
  </script>

</body>
</html>
